<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Modelos - NyuraMotors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="Panel.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(20px);
        }
        
        .admin-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .admin-subtitle {
            font-family: 'Inter', sans-serif;
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .model-card {
            background: linear-gradient(145deg, rgba(20, 20, 30, 0.95), rgba(30, 30, 40, 0.9));
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }
        
        .model-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.15);
        }
        
        .model-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }
        
        .model-content {
            padding: 1.5rem;
        }
        
        .model-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .model-price {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .model-specs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .spec-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        
        .spec-label {
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .spec-value {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .model-actions {
            display: flex;
            gap: 0.75rem;
        }
        
        .btn-edit, .btn-delete {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn-edit {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }
        
        .add-model-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        
        .add-model-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }
        
        .error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            border-radius: 8px;
            padding: 1rem;
            color: #e74c3c;
            margin-bottom: 2rem;
        }
        
        .success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 8px;
            padding: 1rem;
            color: #2ecc71;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 768px) {
            .admin-container {
                padding: 1rem;
            }
            
            .models-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .admin-header {
                padding: 1.5rem;
            }
            
            .admin-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
    <nav>
        <a href="Panel.html" class="back-button">
            <i class="fas fa-arrow-left"></i>
            Volver Atrás
        </a>
    </nav>
</header>
    
    <main>
        <div class="models-header">
            <h1>Gestión de Modelos</h1>
            <button class="add-model-btn" onclick="openAddModal()">
                <i class="fas fa-plus"></i>
                Añadir Nuevo Modelo
            </button>
        </div>
            
        <div id="messages"></div>
            
            <div id="modelsContainer" class="models-grid">
                <div class="loading">Cargando modelos...</div>
            </div>
        </div>
    </main>

    <!-- Modal para añadir/editar modelo -->
    <div id="modelModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">Añadir Modelo</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="modelForm" class="form">
                    <div class="form__row">
                        <div class="field">
                            <label class="field__label">Nombre del Modelo</label>
                            <input type="text" id="modelName" class="field__input" required>
                        </div>
                        <div class="field">
                            <label class="field__label">Precio</label>
                            <input type="number" id="modelPrice" class="field__input" min="0" step="0.01" required>
                        </div>
                    </div>
                    
                    <div class="form__row">
                        <div class="field">
                            <label class="field__label">Autonomía (km)</label>
                            <input type="number" id="modelRange" class="field__input" min="0" required>
                        </div>
                        <div class="field">
                            <label class="field__label">Potencia (kW)</label>
                            <input type="number" id="modelPower" class="field__input" min="0" required>
                        </div>
                    </div>
                    
                    <div class="form__row">
                        <div class="field">
                            <label class="field__label">Aceleración 0-100 (s)</label>
                            <input type="number" id="modelAcceleration" class="field__input" min="0" step="0.1" required>
                        </div>
                        <div class="field">
                            <label class="field__label">Velocidad Máxima (km/h)</label>
                            <input type="number" id="modelMaxSpeed" class="field__input" min="0" required>
                        </div>
                    </div>
                    
                    <div class="field">
                        <label class="field__label">URL de la Imagen</label>
                        <input type="url" id="modelImage" class="field__input" placeholder="https://ejemplo.com/imagen.jpg">
                    </div>
                    
                    <div class="field">
                        <label class="field__label">Descripción</label>
                        <textarea id="modelDescription" class="field__input field__input--textarea" rows="4"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-accept" onclick="saveModel()">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getCurrentUser, onAuthStateChange, getModels, createModel, updateModel, deleteModel, toggleModelStatus } from '../../controlador/BBDD/SupabaseCliente.js';
        
        let currentEditingId = null;
        let models = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            // Verificar si el usuario es administrador
            getCurrentUser().then(user => {
                if (!user) {
                    window.location.href = 'InicioSesion.html';
                    return;
                }
                
                // Aquí podrías verificar si el usuario tiene rol de administrador
                loadModels();
            });
            
            // Cerrar modal al hacer clic fuera
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('modelModal');
                if (event.target === modal) {
                    closeModal();
                }
            });
        });
        
        async function loadModels() {
            try {
                const result = await getModels();
                if (result.success) {
                    models = result.data;
                    displayModels(models);
                } else {
                    showMessage('Error al cargar modelos: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error inesperado al cargar modelos', 'error');
            }
        }
        
        function displayModels(modelsToDisplay) {
            const container = document.getElementById('modelsContainer');
            
            if (modelsToDisplay.length === 0) {
                container.innerHTML = '<div class="loading">No hay modelos disponibles</div>';
                return;
            }
            
            container.innerHTML = modelsToDisplay.map(model => `
                <div class="model-card">
                    <img src="${model.imagen || 'https://picsum.photos/seed/' + model.nombre + '/400/200.jpg'}" 
                         alt="${model.nombre}" 
                         class="model-image"
                         onerror="this.src='https://picsum.photos/seed/default/400/200.jpg'">
                    <div class="model-content">
                        <div class="model-header">
                            <h3 class="model-name">${model.nombre}</h3>
                            <span class="model-gama">${model.gama}</span>
                        </div>
                        <div class="model-price">${formatPrice(model.precio)}</div>
                        ${model.descripcion_corta ? `<p class="model-description">${model.descripcion_corta}</p>` : ''}
                        <div class="model-status">
                            <span class="status-label">Estado:</span>
                            <span class="status-value ${model.activo ? 'active' : 'inactive'}">
                                ${model.activo ? 'Activo' : 'Inactivo'}
                            </span>
                            <button class="btn-toggle ${model.activo ? 'btn-deactivate' : 'btn-activate'}" 
                                    onclick="toggleStatus('${model.id}', ${!model.activo})">
                                <i class="fas ${model.activo ? 'fa-toggle-off' : 'fa-toggle-on'}"></i>
                                ${model.activo ? 'Desactivar' : 'Activar'}
                            </button>
                        </div>
                        ${model.modelo_colores && model.modelo_colores.length > 0 ? `
                            <div class="model-colors">
                                <h4>Colores disponibles:</h4>
                                <div class="colors-list">
                                    ${model.modelo_colores.map(mc => `
                                        <div class="color-item">
                                            <div class="color-swatch" style="background-color: ${mc.colores.hex}"></div>
                                            <span class="color-name">${mc.colores.nombre}</span>
                                            ${mc.colores.precio_extra > 0 ? `<span class="color-price">+${formatPrice(mc.colores.precio_extra)}</span>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        <div class="model-actions">
                            <button class="btn-edit" onclick="editModel('${model.id}')">Editar</button>
                            <button class="btn-delete" onclick="confirmDelete('${model.id}')">Eliminar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function formatPrice(price) {
            return new Intl.NumberFormat('es-ES', {
                style: 'currency',
                currency: 'EUR'
            }).format(price || 0);
        }
        
        function openAddModal() {
            currentEditingId = null;
            document.getElementById('modalTitle').textContent = 'Añadir Modelo';
            document.getElementById('modelForm').reset();
            document.getElementById('modelModal').style.display = 'flex';
        }
        
        function editModel(id) {
            const model = models.find(m => m.id === id);
            if (!model) return;
            
            currentEditingId = id;
            document.getElementById('modalTitle').textContent = 'Editar Modelo';
            
            // Rellenar el formulario
            document.getElementById('modelName').value = model.nombre || '';
            document.getElementById('modelPrice').value = model.precio || '';
            document.getElementById('modelRange').value = model.autonomia || '';
            document.getElementById('modelPower').value = model.potencia || '';
            document.getElementById('modelAcceleration').value = model.aceleracion || '';
            document.getElementById('modelMaxSpeed').value = model.velocidad_max || '';
            document.getElementById('modelImage').value = model.imagen || '';
            document.getElementById('modelDescription').value = model.descripcion || '';
            
            document.getElementById('modelModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modelModal').style.display = 'none';
            document.getElementById('modelForm').reset();
            currentEditingId = null;
        }
        
        async function saveModel() {
            const formData = {
                nombre: document.getElementById('modelName').value,
                precio: parseFloat(document.getElementById('modelPrice').value),
                autonomia: parseInt(document.getElementById('modelRange').value),
                potencia: parseInt(document.getElementById('modelPower').value),
                aceleracion: parseFloat(document.getElementById('modelAcceleration').value),
                velocidad_max: parseInt(document.getElementById('modelMaxSpeed').value),
                imagen: document.getElementById('modelImage').value,
                descripcion: document.getElementById('modelDescription').value
            };
            
            try {
                let result;
                if (currentEditingId) {
                    result = await updateModel(currentEditingId, formData);
                } else {
                    result = await createModel(formData);
                }
                
                if (result.success) {
                    showMessage(currentEditingId ? 'Modelo actualizado correctamente' : 'Modelo creado correctamente', 'success');
                    closeModal();
                    loadModels();
                } else {
                    showMessage('Error: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error inesperado', 'error');
            }
        }
        
        function confirmDelete(id) {
            if (confirm('¿Estás seguro de que quieres eliminar este modelo? Esta acción no se puede deshacer.')) {
                deleteModelFromUI(id);
            }
        }
        
        async function deleteModelFromUI(id) {
            try {
                const result = await deleteModel(id);
                if (result.success) {
                    showMessage('Modelo eliminado correctamente', 'success');
                    loadModels();
                } else {
                    showMessage('Error al eliminar modelo: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error inesperado al eliminar modelo', 'error');
            }
        }
        
        async function toggleStatus(id, newStatus) {
            try {
                const result = await toggleModelStatus(id, newStatus);
                if (result.success) {
                    showMessage(`Modelo ${newStatus ? 'activado' : 'desactivado'} correctamente`, 'success');
                    loadModels();
                } else {
                    showMessage('Error al cambiar estado del modelo: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error inesperado al cambiar estado del modelo', 'error');
            }
        }
        
        function showMessage(message, type) {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            messagesContainer.appendChild(messageDiv);
            
            // Auto-eliminar después de 5 segundos
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }
        
        // Hacer las funciones globales para que puedan ser llamadas desde el HTML
        window.openAddModal = openAddModal;
        window.closeModal = closeModal;
        window.saveModel = saveModel;
        window.editModel = editModel;
        window.confirmDelete = confirmDelete;
        window.toggleStatus = toggleStatus;
    </script>
</body>
</html>
